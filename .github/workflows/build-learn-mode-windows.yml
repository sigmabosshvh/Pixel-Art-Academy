name: Build Learn Mode for Windows (diagnostic)

on:
  workflow_dispatch:
    inputs:
      meteor_limit_minutes:
        required: true
        default: "300"

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-2022

    env:
      METEOR_PRETTY_OUTPUT: "0"
      METEOR_NO_RELEASE_CHECK: "1"
      MD_LOG_LEVEL: "INFO,WARN,ERROR"

    steps:
      - name: Checkout Pixel Art Academy learn-mode
        uses: actions/checkout@v4
        with:
          repository: Retronator/Pixel-Art-Academy
          ref: learn-mode
          path: Pixel-Art-Academy
          persist-credentials: false

      - name: Checkout Retronator meteor-desktop
        uses: actions/checkout@v4
        with:
          repository: Retronator/meteor-desktop
          ref: master
          path: meteor-desktop
          persist-credentials: false

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18.19.1
          cache: npm
          cache-dependency-path: |
            Pixel-Art-Academy/package-lock.json
            meteor-desktop/package-lock.json

      - name: Restore Meteor cache
        id: meteor-cache
        uses: actions/cache/restore@v4
        with:
          path: ~\AppData\Local\.meteor
          key: meteor-windows-2.16-${{ hashFiles('Pixel-Art-Academy/.meteor/release', 'Pixel-Art-Academy/.meteor/versions') }}
          restore-keys: |
            meteor-windows-2.16-

      - name: Install Meteor launcher and verify project release
        working-directory: Pixel-Art-Academy
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $meteorDir = Join-Path $env:LOCALAPPDATA ".meteor"

          # Для текущего шага.
          $env:PATH = "$meteorDir;$env:PATH"

          # Устанавливаем launcher только при его отсутствии.
          if (-not (Get-Command meteor -ErrorAction SilentlyContinue)) {
            npm install --global meteor@2.16.0 --foreground-script
            $env:PATH = "$meteorDir;$env:PATH"
          }

          # Для последующих шагов.
          $meteorDir |
            Out-File `
              -FilePath $env:GITHUB_PATH `
              -Encoding utf8 `
              -Append

          $expectedRelease = (
            Get-Content ".meteor/release" -Raw
          ).Trim()

          Write-Host "Project release file: $expectedRelease"
          Write-Host "Meteor launcher: $((Get-Command meteor).Source)"

          # Команда выполняется внутри Pixel-Art-Academy,
          # поэтому Meteor должен выбрать версию проекта.
          $version = (
            meteor --version |
            Out-String
          ).Trim()

          Write-Host "Project Meteor version: $version"

          if ($expectedRelease -notmatch "^METEOR@2\.16") {
            throw "Unexpected .meteor/release: $expectedRelease"
          }

          if ($version -notmatch "^Meteor 2\.16") {
            throw "Project did not select Meteor 2.16. Actual: $version"
          }

      - name: Install, patch and compile meteor-desktop
        working-directory: meteor-desktop
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          npm install --no-audit --no-fund

          $patchScript = Join-Path `
            $env:RUNNER_TEMP `
            "patch-meteor-desktop.cjs"

          @'
          const fs = require("fs");

          const file = "lib/meteorApp.js";

          let source = fs.readFileSync(file, "utf8");

          const oldCheck =
            /if\s*\(\s*~text\.indexOf\(\s*'src="\/cordova\.js"'\s*\)\s*\)\s*\{\s*return text;\s*\}\s*return false;/m;

          if (!oldCheck.test(source)) {
            throw new Error(
              "Could not find the old strict cordova.js check " +
              "in lib/meteorApp.js"
            );
          }

          source = source.replace(
            oldCheck,
            `
            if (
              res.ok &&
              /(?:src\\s*=\\s*["'][^"']*cordova\\.js[^"']*["']|cordova\\.js)/i.test(text)
            ) {
              return text;
            }

            throw new Error(
              "Downloaded __cordova/index.html, but it does not " +
              "appear to be a Cordova index. HTTP status: " +
              res.status +
              ". First 500 characters: " +
              text.slice(0, 500)
            );
            `
          );

          fs.writeFileSync(file, source, "utf8");

          console.log(
            "Patched meteor-desktop Cordova index validation."
          );
          '@ | Set-Content `
            -LiteralPath $patchScript `
            -Encoding utf8NoBOM

          node.exe $patchScript

          if ($LASTEXITCODE -ne 0) {
            throw "Could not patch meteor-desktop."
          }

          npm run build

          if ($LASTEXITCODE -ne 0) {
            throw "Could not compile meteor-desktop."
          }

          if (-not (Test-Path "dist/bin/cli.js")) {
            throw "meteor-desktop did not produce dist/bin/cli.js"
          }

      - name: Disable Steam integration
        working-directory: Pixel-Art-Academy
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $settingsPath = ".desktop/settings.json"
          $settings = Get-Content $settingsPath -Raw |
            ConvertFrom-Json

          if ($settings.dependencies) {
            $settings.dependencies.PSObject.Properties.Remove(
              "steamworks.js"
            )
          }

          $settings.packagerOptions.platform = "win32"
          $settings.packagerOptions.arch = "x64"

          $settings |
            ConvertTo-Json -Depth 100 |
            Set-Content `
              $settingsPath `
              -Encoding utf8NoBOM

          @'
          import moduleJson from './module.json';

          export default class Steam {
            constructor({ log, Module }) {
              this.log = log;
              this.module = new Module(moduleJson.name);

              this.module.on(
                'initialize',
                (event, fetchId) => {
                  this.log.verbose(
                    'Steam is disabled in this build.'
                  );

                  this.module.respond(
                    'initialize',
                    fetchId,
                    null
                  );
                }
              );

              this.module.on(
                'setEnabledForApp',
                (event, fetchId) => {
                  this.module.respond(
                    'setEnabledForApp',
                    fetchId,
                    null
                  );
                }
              );
            }
          }
          '@ | Set-Content `
            ".desktop/modules/steam/index.js" `
            -Encoding utf8NoBOM

          Write-Host "Steam dependency removed."
          Write-Host "Target set to Windows x64."

      - name: Install application dependencies
        working-directory: Pixel-Art-Academy
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          meteor npm install

      - name: Materialize all public symlinks
        working-directory: Pixel-Art-Academy
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $scriptPath = Join-Path `
            $env:RUNNER_TEMP `
            "materialize-public-symlinks.cjs"

          @'
          const fs = require("fs");
          const os = require("os");
          const path = require("path");
          const crypto = require("crypto");
          const { execFileSync } = require("child_process");

          const repositoryRoot = process.cwd();

          function run(command, args, options = {}) {
            return execFileSync(command, args, {
              cwd: repositoryRoot,
              encoding: "utf8",
              stdio: options.stdio || ["ignore", "pipe", "pipe"],
              ...options,
            });
          }

          function git(args) {
            return run("git.exe", args);
          }

          function escapeRegExp(value) {
            return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          }

          function copyTarget(source, destination) {
            if (!fs.existsSync(source)) {
              throw new Error(`Source does not exist: ${source}`);
            }

            fs.mkdirSync(path.dirname(destination), {
              recursive: true,
            });

            const sourceStats = fs.statSync(source);

            if (sourceStats.isDirectory()) {
              fs.mkdirSync(destination, {
                recursive: true,
              });

              fs.cpSync(source, destination, {
                recursive: true,
                force: true,
                dereference: true,
              });
            } else {
              fs.copyFileSync(source, destination);
            }
          }

          function parseNpmTarget(targetAbsolutePath) {
            const parts = path.normalize(targetAbsolutePath).split(path.sep);
            const nodeModulesIndex = parts.lastIndexOf("node_modules");

            if (nodeModulesIndex < 0) {
              return null;
            }

            let packageName;
            let packagePartsCount;

            if (
              parts[nodeModulesIndex + 1] &&
              parts[nodeModulesIndex + 1].startsWith("@")
            ) {
              packageName =
                `${parts[nodeModulesIndex + 1]}/` +
                `${parts[nodeModulesIndex + 2]}`;

              packagePartsCount = 2;
            } else {
              packageName = parts[nodeModulesIndex + 1];
              packagePartsCount = 1;
            }

            if (!packageName) {
              return null;
            }

            const packageSubpath = parts.slice(
              nodeModulesIndex + 1 + packagePartsCount
            );

            const packagesIndex = parts.lastIndexOf(
              "packages",
              nodeModulesIndex
            );

            if (
              packagesIndex < 0 ||
              !parts[packagesIndex + 1]
            ) {
              return null;
            }

            const meteorPackageDirectory = path.join(
              ...parts.slice(0, packagesIndex + 2)
            );

            return {
              packageName,
              packageSubpath,
              meteorPackageDirectory,
            };
          }

          function findPackageVersion(
            meteorPackageDirectory,
            packageName
          ) {
            const packageJsPath = path.join(
              meteorPackageDirectory,
              "package.js"
            );

            if (!fs.existsSync(packageJsPath)) {
              throw new Error(
                `Meteor package.js was not found: ${packageJsPath}`
              );
            }

            const packageJs = fs.readFileSync(
              packageJsPath,
              "utf8"
            );

            const escapedName = escapeRegExp(packageName);

            const versionPattern = new RegExp(
              `["']${escapedName}["']\\s*:\\s*["']([^"']+)["']`
            );

            const match = packageJs.match(versionPattern);

            if (!match) {
              throw new Error(
                `Could not find npm version for ${packageName} ` +
                `in ${packageJsPath}`
              );
            }

            return match[1];
          }

          function installNpmTarget(parsedTarget) {
            const version = findPackageVersion(
              parsedTarget.meteorPackageDirectory,
              parsedTarget.packageName
            );

            const installId = crypto
              .createHash("sha256")
              .update(
                `${parsedTarget.packageName}@${version}`
              )
              .digest("hex")
              .slice(0, 16);

            const installDirectory = path.join(
              process.env.RUNNER_TEMP || os.tmpdir(),
              "paa-public-dependencies",
              installId
            );

            const packageDirectory = path.join(
              installDirectory,
              "node_modules",
              ...parsedTarget.packageName.split("/")
            );

            if (!fs.existsSync(packageDirectory)) {
              fs.mkdirSync(installDirectory, {
                recursive: true,
              });

              console.log(
                `Installing ${parsedTarget.packageName}@${version}`
              );

              execFileSync(
                "npm.cmd",
                [
                  "install",
                  "--prefix",
                  installDirectory,
                  "--no-save",
                  "--no-package-lock",
                  "--ignore-scripts",
                  "--no-audit",
                  "--no-fund",
                  `${parsedTarget.packageName}@${version}`,
                ],
                {
                  cwd: repositoryRoot,
                  stdio: "inherit",
                }
              );
            }

            const source = path.join(
              packageDirectory,
              ...parsedTarget.packageSubpath
            );

            if (!fs.existsSync(source)) {
              throw new Error(
                `Installed package does not contain expected path: ` +
                `${source}`
              );
            }

            return source;
          }

          const indexOutput = git([
            "ls-files",
            "-s",
            "--",
            "public",
          ]);

          const symlinks = indexOutput
            .split(/\r?\n/)
            .filter(Boolean)
            .filter((line) => line.startsWith("120000 "))
            .map((line) => {
              const tabIndex = line.indexOf("\t");

              if (tabIndex < 0) {
                throw new Error(
                  `Unexpected git ls-files output: ${line}`
                );
              }

              return line.slice(tabIndex + 1);
            });

          console.log(
            `Found ${symlinks.length} tracked symlink(s) under public.`
          );

          for (const repositoryPath of symlinks) {
            const targetText = git([
              "show",
              `HEAD:${repositoryPath}`,
            ]).trim();

            const destination = path.join(
              repositoryRoot,
              ...repositoryPath.split("/")
            );

            const directTarget = path.resolve(
              path.dirname(destination),
              targetText
            );

            console.log("");
            console.log(`Materializing: ${repositoryPath}`);
            console.log(`Link target:   ${targetText}`);

            execFileSync(
              "git.exe",
              [
                "rm",
                "-f",
                "--",
                repositoryPath,
              ],
              {
                cwd: repositoryRoot,
                stdio: "inherit",
              }
            );

            let source;

            if (fs.existsSync(directTarget)) {
              source = directTarget;

              console.log(
                `Using existing target: ${source}`
              );
            } else {
              const parsedTarget = parseNpmTarget(
                directTarget
              );

              if (!parsedTarget) {
                throw new Error(
                  `Target is missing and is not an npm path:\n` +
                  `${directTarget}`
                );
              }

              source = installNpmTarget(parsedTarget);

              console.log(
                `Using npm package target: ${source}`
              );
            }

            copyTarget(source, destination);

            const result = fs.lstatSync(destination);

            if (result.isSymbolicLink()) {
              throw new Error(
                `Destination is still a symlink: ${destination}`
              );
            }

            console.log(
              `Created real ${result.isDirectory() ? "directory" : "file"}.`
            );
          }

          console.log("");
          console.log(
            "All tracked public symlinks were materialized."
          );
          '@ | Set-Content `
            -LiteralPath $scriptPath `
            -Encoding utf8NoBOM

          node.exe $scriptPath

          if ($LASTEXITCODE -ne 0) {
            throw "Could not materialize public symlinks."
          }

          Write-Host ""
          Write-Host "Remaining filesystem reparse points under public:"

          $remainingLinks = @(
            Get-ChildItem `
              "public" `
              -Recurse `
              -Force `
              -ErrorAction SilentlyContinue |
            Where-Object {
              $_.Attributes -band
              [System.IO.FileAttributes]::ReparsePoint
            }
          )

          if ($remainingLinks.Count -gt 0) {
            $remainingLinks |
              Select-Object `
                FullName,
                LinkType,
                Target |
              Format-Table -AutoSize

            throw (
              "Some reparse points remain under public."
            )
          }

          Write-Host "No reparse points remain under public."
      
      - name: Build Meteor with live diagnostics and package
        working-directory: Pixel-Art-Academy
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $logDir = Join-Path $PWD "build-logs"

          New-Item `
            -ItemType Directory `
            -Force `
            -Path $logDir |
            Out-Null

          $stdoutLog = Join-Path `
            $logDir `
            "meteor.stdout.log"

          $stderrLog = Join-Path `
            $logDir `
            "meteor.stderr.log"

          $diagnosticLog = Join-Path `
            $logDir `
            "diagnostics.log"

          $packageLog = Join-Path `
            $logDir `
            "package.log"

          $programJson = Join-Path `
            $PWD `
            ".meteor/local/build/programs/web.cordova/program.json"

          function Write-Diagnostic {
            param([string]$Message)

            $line = "[{0}] {1}" -f (
              Get-Date -Format "yyyy-MM-ddTHH:mm:ss.fffK"
            ), $Message

            Write-Host $line

            Add-Content `
              -Path $diagnosticLog `
              -Value $line `
              -Encoding utf8
          }

          function Show-FileTail {
            param(
              [string]$Label,
              [string]$Path,
              [int]$Lines = 80
            )

            Write-Host "::group::$Label"

            if (Test-Path $Path) {
              Get-Content `
                $Path `
                -Tail $Lines `
                -ErrorAction SilentlyContinue
            } else {
              Write-Host "File has not been created yet:"
              Write-Host $Path
            }

            Write-Host "::endgroup::"
          }

          function Test-MeteorReady {
            if (-not (Test-Path $programJson)) {
              return $false
            }

            try {
              $index = Invoke-WebRequest `
                -Uri "http://127.0.0.1:3080/__cordova/index.html" `
                -TimeoutSec 10 `
                -UseBasicParsing

              $manifest = Invoke-WebRequest `
                -Uri "http://127.0.0.1:3080/__cordova/manifest.json?meteor_dont_serve_index=true" `
                -TimeoutSec 10 `
                -UseBasicParsing

              return (
                $index.StatusCode -eq 200 -and
                $manifest.StatusCode -eq 200
              )
            } catch {
              return $false
            }
          }

          function Show-SystemState {
            Write-Host "::group::Disk and process state"

            Get-PSDrive C |
              Select-Object `
                Name,
                @{
                  Name = "UsedGB"
                  Expression = {
                    [math]::Round($_.Used / 1GB, 2)
                  }
                },
                @{
                  Name = "FreeGB"
                  Expression = {
                    [math]::Round($_.Free / 1GB, 2)
                  }
                } |
              Format-Table -AutoSize

            Get-Process `
              -Name node, mongod `
              -ErrorAction SilentlyContinue |
              Sort-Object CPU -Descending |
              Select-Object `
                -First 20 `
                Id,
                ProcessName,
                @{
                  Name = "CPUSeconds"
                  Expression = {
                    [math]::Round($_.CPU, 1)
                  }
                },
                @{
                  Name = "RAMMB"
                  Expression = {
                    [math]::Round(
                      $_.WorkingSet64 / 1MB,
                      1
                    )
                  }
                },
                StartTime |
              Format-Table -AutoSize

            if (Test-Path $programJson) {
              Get-Item $programJson |
                Select-Object `
                  FullName,
                  Length,
                  LastWriteTime |
                Format-List
            } else {
              Write-Host `
                "web.cordova/program.json does not exist yet."
            }

            Get-Item `
              $stdoutLog,
              $stderrLog `
              -ErrorAction SilentlyContinue |
              Select-Object `
                FullName,
                Length,
                LastWriteTime |
              Format-Table -AutoSize

            Write-Host "::endgroup::"
          }

          $meteorArguments = @(
            "run",
            "--verbose",
            "--mobile-server=http://127.0.0.1:3000",
            "-p",
            "3080"
          )

          $meteorCommandLine = (
            "meteor {0}" -f (
              $meteorArguments -join " "
            )
          )

          Write-Diagnostic (
            "Starting Meteor: $meteorCommandLine"
          )

          # cmd.exe используется, чтобы одинаково запускать
          # meteor.bat, meteor.cmd или другой Windows shim.
          $meteorProcess = Start-Process `
            -FilePath $env:ComSpec `
            -ArgumentList @(
              "/d",
              "/s",
              "/c",
              $meteorCommandLine
            ) `
            -WorkingDirectory $PWD.Path `
            -RedirectStandardOutput $stdoutLog `
            -RedirectStandardError $stderrLog `
            -NoNewWindow `
            -PassThru

          $startedAt = Get-Date

          $limitMinutes = [int](
            "${{ inputs.meteor_limit_minutes }}"
          )

          $deadline = $null

          if ($limitMinutes -gt 0) {
            $deadline = $startedAt.AddMinutes(
              $limitMinutes
            )

            Write-Diagnostic (
              "Graceful diagnostic deadline: $deadline"
            )
          } else {
            Write-Diagnostic (
              "No internal Meteor deadline; " +
              "GitHub's job limit is the only limit."
            )
          }

          $ready = $false
          $heartbeat = 0

          try {
            while ($true) {
              $meteorProcess.Refresh()

              if (Test-MeteorReady) {
                $ready = $true

                Write-Diagnostic (
                  "Meteor web.cordova endpoint is ready."
                )

                break
              }

              if ($meteorProcess.HasExited) {
                Write-Diagnostic (
                  "Meteor exited with code " +
                  "$($meteorProcess.ExitCode)."
                )

                break
              }

              if (
                $null -ne $deadline -and
                (Get-Date) -ge $deadline
              ) {
                Write-Diagnostic (
                  "Graceful diagnostic deadline reached."
                )

                break
              }

              Start-Sleep -Seconds 60
              $heartbeat++

              $elapsed = (Get-Date) - $startedAt

              Write-Diagnostic (
                "Heartbeat #{0}; elapsed {1:hh\:mm\:ss}; PID {2}" -f
                $heartbeat,
                $elapsed,
                $meteorProcess.Id
              )

              if (($heartbeat % 5) -eq 0) {
                Show-FileTail `
                  "Meteor stdout — last 80 lines" `
                  $stdoutLog

                Show-FileTail `
                  "Meteor stderr — last 80 lines" `
                  $stderrLog

                Show-SystemState
              }
            }

            if (-not $ready) {
              Show-FileTail `
                "Final Meteor stdout" `
                $stdoutLog `
                200

              Show-FileTail `
                "Final Meteor stderr" `
                $stderrLog `
                200

              Show-SystemState

              if ($meteorProcess.HasExited) {
                throw (
                  "Meteor exited before web.cordova " +
                  "became ready."
                )
              }

              throw (
                "Meteor did not become ready before " +
                "the diagnostic deadline."
              )
            }

            Write-Diagnostic (
              "Running meteor-desktop package against " +
              "the live Meteor server."
            )

            & npm.cmd run desktop -- package `
              http://127.0.0.1:3000 `
              --port 3080 2>&1 |
              Tee-Object -FilePath $packageLog

            $packageExitCode = $LASTEXITCODE

            if ($packageExitCode -ne 0) {
              throw (
                "meteor-desktop package failed with " +
                "exit code $packageExitCode"
              )
            }

            if (-not (Test-Path ".desktop-package")) {
              throw ".desktop-package was not created."
            }

            Write-Diagnostic (
              "Windows package was created successfully."
            )
          } finally {
            if ($null -ne $meteorProcess) {
              $meteorProcess.Refresh()

              if (-not $meteorProcess.HasExited) {
                Write-Diagnostic (
                  "Stopping Meteor process tree."
                )

                & taskkill.exe `
                  /PID $meteorProcess.Id `
                  /T `
                  /F |
                  Out-Null
              }
            }
          }

      - name: Verify Windows package
        working-directory: Pixel-Art-Academy
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $exe = Get-ChildItem `
            ".desktop-package" `
            -Recurse `
            -Filter "Pixel Art Academy Learn Mode.exe" |
            Select-Object -First 1

          if (-not $exe) {
            $exe = Get-ChildItem `
              ".desktop-package" `
              -Recurse `
              -Filter "*.exe" |
              Sort-Object Length -Descending |
              Select-Object -First 1
          }

          if (-not $exe) {
            throw "No Windows executable was produced."
          }

          Write-Host "Executable: $($exe.FullName)"
          Write-Host "Size: $($exe.Length) bytes"

      - name: Prepare build artifact
        working-directory: Pixel-Art-Academy
        shell: pwsh
        run: |
          $destination = Join-Path `
            $env:GITHUB_WORKSPACE `
            "windows-build"

          New-Item `
            -ItemType Directory `
            -Force `
            -Path $destination |
            Out-Null

          Copy-Item `
            ".desktop-package\*" `
            $destination `
            -Recurse `
            -Force

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: Pixel-Art-Academy-Learn-Mode-Windows-x64
          path: windows-build
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Pixel-Art-Academy-diagnostic-logs
          path: |
            Pixel-Art-Academy/build-logs
            Pixel-Art-Academy/meteor.log
            Pixel-Art-Academy/.meteor/local/**/*.log
            Pixel-Art-Academy/.meteor/local/build/programs/web.cordova/program.json
          if-no-files-found: warn
          retention-days: 14
          include-hidden-files: true

      - name: Save Meteor cache
        if: always() && steps.meteor-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~\AppData\Local\.meteor
          key: ${{ steps.meteor-cache.outputs.cache-primary-key }}